# kubectl create secret generic app-secrets \
#   --from-literal=MONGODB_URI='<your-uri>' \
#   --from-literal=JWT_SECRET='<your-secret>' \
#   --from-literal=YALIES_API_KEY='<your-key>' \
#   --from-literal=DO_SPACES_KEY='<your-key>' \
#   --from-literal=DO_SPACES_SECRET='<your-secret>'
#
# Or apply this file after base64-encoding each value:
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
data:
  # echo -n '<value>' | base64
  MONGODB_URI: ""       # replace with base64-encoded value
  JWT_SECRET: ""
  YALIES_API_KEY: ""
  DO_SPACES_KEY: ""
  DO_SPACES_SECRET: ""
